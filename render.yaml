services:
  - type: web
    name: mykare-voice-agent
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GROQ_OPENAI_API_KEY
        sync: false
      - key: STUN_URL
        value: stun:stun.l.google.com:19302
      # Optional TURN relay (needed if Render blocks UDP)
      # - key: TURN_URL
      #   sync: false
      # - key: TURN_USERNAME
      #   sync: false
      # - key: TURN_PASSWORD
      #   sync: false
